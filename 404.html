<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found — MockVault</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" sizes="48x48"   href="/brand_assets/icon46.png">
  <link rel="icon" type="image/png" sizes="96x96"   href="/brand_assets/icon96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/brand_assets/icon192.png">
  <link rel="apple-touch-icon"      sizes="192x192" href="/brand_assets/icon192.png">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #71dc29;
      --accent-dim: rgba(113, 220, 41, 0.18);
      --accent-glow: rgba(113, 220, 41, 0.35);
      --bg: #080808;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.07);
      --border-accent: rgba(113, 220, 41, 0.28);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.55);
      --text-dim: rgba(255, 255, 255, 0.35);
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(ellipse 55% 35% at 72% 18%, rgba(113,220,41,0.045) 0%, transparent 65%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      opacity: 0.015;
      pointer-events: none;
      z-index: 9999;
    }

    .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .bg-orb { position: absolute; border-radius: 50%; filter: blur(150px); }
    .bg-orb-1 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, #71dc29, transparent 70%);
      top: -160px; right: -80px; opacity: 0.07;
    }
    .bg-orb-2 {
      width: 280px; height: 280px;
      background: radial-gradient(circle, #71dc29, transparent 70%);
      bottom: 12%; left: -80px; opacity: 0.04;
    }

    nav {
      padding: 16px 32px;
      position: relative;
      z-index: 1;
    }
    .nav-logo img {
      height: 36px;
      width: auto;
      display: block;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      z-index: 1;
    }

    .stage {
      max-width: 520px;
      text-align: center;
    }

    .glyph {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: clamp(80px, 14vw, 140px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      margin-bottom: 24px;
      color: var(--accent);
      text-shadow: 0 0 60px rgba(113, 220, 41, 0.35);
    }
    .glyph .digit-zero {
      display: inline-block;
      width: 0.85em;
      height: 0.85em;
      border: 0.12em solid var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 32px rgba(113, 220, 41, 0.45);
      animation: zero-spin 8s linear infinite;
    }
    @keyframes zero-spin {
      0%   { transform: rotate(0deg) scale(1); }
      50%  { transform: rotate(180deg) scale(1.04); }
      100% { transform: rotate(360deg) scale(1); }
    }

    h1 {
      font-size: clamp(28px, 4vw, 36px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 12px;
      text-wrap: balance;
    }

    p {
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 32px;
      text-wrap: balance;
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 11px 22px;
      border-radius: 100px;
      cursor: pointer;
      text-decoration: none;
      border: none;
      transition: var(--transition);
    }
    .btn-primary {
      background: var(--accent);
      color: #000;
      box-shadow: 0 0 24px var(--accent-glow), 0 4px 12px rgba(0,0,0,0.3);
    }
    .btn-primary:hover {
      background: #82e83c;
      transform: translateY(-1px);
    }
    .btn-ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover {
      background: rgba(255,255,255,0.07);
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      nav { padding: 14px 20px; }
      .nav-logo img { height: 30px; }
      main { padding: 24px 16px 56px; }
    }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
  </div>

  <nav>
    <a class="nav-logo" href="/">
      <img src="/brand_assets/mockvaultlogo.png" alt="MockVault">
    </a>
  </nav>

  <main>
    <div class="stage">
      <div class="glyph" aria-label="404">
        4<span class="digit-zero" aria-hidden="true"></span>4
      </div>
      <h1>This mockup is in another folder.</h1>
      <p>The page you're looking for doesn't exist — or maybe it moved. Either way, let's get you back to something useful.</p>
      <div class="actions">
        <a href="/" class="btn btn-primary">
          Back to MockVault
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
        <a href="/account" class="btn btn-ghost">Your account</a>
      </div>
    </div>
  </main>
</body>
</html>
