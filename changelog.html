<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Changelog — MockVault</title>
  <meta name="description" content="MockVault release notes — every plugin update and what's in it.">
  <link rel="icon" type="image/png" sizes="48x48"   href="/brand_assets/icon46.png">
  <link rel="icon" type="image/png" sizes="96x96"   href="/brand_assets/icon96.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/brand_assets/icon192.png">
  <link rel="apple-touch-icon"      sizes="192x192" href="/brand_assets/icon192.png">
  <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400,300&display=swap" rel="stylesheet">
  <script src="/assets/tracker.js" defer></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --accent: #71dc29;
      --accent-dim: rgba(113, 220, 41, 0.18);
      --bg: #080808;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.07);
      --text: #ffffff;
      --text-muted: rgba(255, 255, 255, 0.55);
      --text-dim: rgba(255, 255, 255, 0.35);
      --radius: 16px;
      --transition: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    body {
      font-family: 'Satoshi', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 55% 35% at 72% 18%, rgba(113,220,41,0.04) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }
    nav {
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 8, 8, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .container {
      max-width: 760px;
      width: 100%;
      margin: 0 auto;
      padding: 0 32px;
      position: relative;
      z-index: 1;
    }
    .nav-inner { display: flex; align-items: center; justify-content: space-between; }
    .nav-logo img { height: 32px; }
    .nav-back {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }
    main {
      flex: 1;
      padding: 64px 0 96px;
      position: relative;
      z-index: 1;
    }
    h1 {
      font-size: clamp(32px, 4.5vw, 44px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    .lede {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 48px;
    }
    .lede a { color: var(--accent); text-decoration: none; }
    .lede a:hover { text-decoration: underline; }

    .release {
      padding: 28px 0;
      border-top: 1px solid var(--border);
    }
    .release:first-of-type { border-top: none; padding-top: 0; }
    .release-head {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .release-version {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .release-latest {
      display: inline-flex;
      align-items: center;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 100px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(113,220,41,0.3);
    }
    .release-date {
      color: var(--text-dim);
      font-size: 13px;
    }
    .release-body {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.7;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .release-body.empty { color: var(--text-dim); font-style: italic; }

    .empty-state {
      padding: 48px 0;
      color: var(--text-dim);
      font-size: 15px;
      text-align: center;
    }

    footer {
      padding: 32px 0;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 1;
    }
    .footer-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .footer-logo img { height: 24px; opacity: 0.6; }
    .footer-meta { font-size: 12px; color: var(--text-dim); }
    .footer-meta a { color: var(--text-dim); margin-left: 12px; text-decoration: none; }
    .footer-meta a:hover { color: var(--text-muted); }

    @media (max-width: 600px) {
      .container { padding: 0 20px; }
      main { padding: 40px 0 64px; }
      h1 { font-size: 28px; }
      .release { padding: 24px 0; }
      .release-version { font-size: 19px; }
    }
  </style>
</head>
<body>
  <nav>
    <div class="container">
      <div class="nav-inner">
        <a class="nav-logo" href="/"><img src="brand_assets/mockvaultlogo.png" alt="MockVault"></a>
        <a class="nav-back" href="/">← Back to MockVault</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <h1>Changelog</h1>
      <p class="lede">
        Every MockVault release. New mockups drop weekly and ship with the next plugin update —
        if you're already a customer, sign in at <a href="/account">your account</a> to grab the latest build.
      </p>

      <div id="releases"><div class="empty-state">Loading releases…</div></div>
    </div>
  </main>

  <footer>
    <div class="container">
      <div class="footer-inner">
        <a class="footer-logo" href="/"><img src="brand_assets/mockvaultlogo.png" alt="MockVault"></a>
        <p class="footer-meta">
          © 2026 MockVault
          <a href="/changelog">Changelog</a>
          <a href="/terms">Terms</a>
          <a href="/privacy">Privacy</a>
          <a href="mailto:support@mockvaultps.com">Support</a>
        </p>
      </div>
    </div>
  </footer>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://mbdftnypfdhvdgdgkhjc.supabase.co";
    const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_it_Px7Rhk4DHtNJ3_qYpNA_YvFMpXLP";
    const supabase = createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
      auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false },
    });

    const root = document.getElementById("releases");

    function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]);
    }
    function formatDate(iso) {
      const d = new Date(iso);
      if (isNaN(d.getTime())) return "";
      return d.toLocaleDateString(undefined, { year: "numeric", month: "long", day: "numeric" });
    }

    async function load() {
      const { data, error } = await supabase
        .from("plugin_releases")
        .select("id, version, changelog, released_at, is_latest")
        .order("released_at", { ascending: false });

      if (error) {
        root.innerHTML = `<div class="empty-state">Couldn't load releases right now.</div>`;
        return;
      }
      if (!data || !data.length) {
        root.innerHTML = `<div class="empty-state">No releases published yet.</div>`;
        return;
      }

      root.innerHTML = data.map(r => `
        <article class="release">
          <div class="release-head">
            <span class="release-version">v${escapeHtml(r.version)}</span>
            ${r.is_latest ? '<span class="release-latest">Latest</span>' : ''}
            <span class="release-date">${escapeHtml(formatDate(r.released_at))}</span>
          </div>
          <div class="release-body${r.changelog ? "" : " empty"}">${
            r.changelog ? escapeHtml(r.changelog) : "No release notes."
          }</div>
        </article>
      `).join("");
    }

    load();
  </script>
</body>
</html>
